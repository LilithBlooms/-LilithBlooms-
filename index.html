<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilith Bloms | Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fffaf5;
  --text:#4a4a4a;
  --card:#ffffff;
  --accent:#f7c6d9;
  --accent2:#e6c78a;
}

/* DARK MODE */
body.dark{
  --bg:#121212;
  --text:#f1f1f1;
  --card:#1e1e1e;
}

/* BASE */
body{
  margin:0;
  font-family:'Montserrat';
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
  overflow-x:hidden;
}

/* FLOATERS */
.floater{
  position:fixed;
  top:-50px;
  width:18px;
  height:18px;
  background:radial-gradient(circle,var(--accent),var(--accent2));
  border-radius:50%;
  opacity:0.5;
  animation:fall 10s linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,var(--accent),#fff);
}

body.dark .hero{
  background:linear-gradient(135deg,#2a2a2a,#121212);
}

.hero h1{
  font-family:'Playfair Display';
  font-size:46px;
}

.hero button{
  margin-top:15px;
  padding:14px 24px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
}

/* SECCIONES */
.section{
  margin:20px;
  padding:20px;
  background:var(--card);
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.section h2{
  text-align:center;
  font-family:'Playfair Display';
}

/* GALERÍA */
.gallery{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.circle{
  min-width:80px;
  height:80px;
  border-radius:50%;
  background-size:cover;
  border:3px solid var(--accent);
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin:15px;
}

.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  margin:8px;
}

.card p{
  margin:6px 8px;
}

.card button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  color:white;
}

/* CART */
.cart-btn{
  position:fixed;
  bottom:15px;
  right:15px;
  padding:14px;
  border-radius:50px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:90%;
  max-width:400px;
  background:var(--card);
  padding:15px;
  border-radius:20px;
}

/* TOOLS PANEL */
.tools{
  position:fixed;
  top:10px;
  right:10px;
  background:var(--card);
  padding:10px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:999;
}

.tools button{
  border:none;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

.tools input{
  width:100%;
}
</style>
</head>

<body>

<!-- TOOLS -->
<div class="tools">
  <button onclick="toggleTheme()">🌗 Modo</button>
  <input type="color" value="#f7c6d9" onchange="changeAccent(this.value)">
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("dark");
}

function changeAccent(color){
  document.documentElement.style.setProperty("--accent", color);
  document.documentElement.style.setProperty("--accent2", shadeColor(color,-20));
}

/* hacer versión más oscura del color */
function shadeColor(color, percent){
  let f=parseInt(color.slice(1),16),
  t=percent<0?0:255,
  p=percent<0?percent*-1:percent,
  R=f>>16,
  G=f>>8&0x00FF,
  B=f&0x0000FF;
  return "#"+(0x1000000+
  (Math.round((t-R)*p)+R)*0x10000+
  (Math.round((t-G)*p)+G)*0x100+
  (Math.round((t-B)*p)+B))
  .toString(16).slice(1);
}
</script>

<!-- FLOATERS -->
<script>
for(let i=0;i<10;i++){
let d=document.createElement("div");
d.className="floater";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(d);
}
</script>

<div class="hero">
  <h1>Lilith Bloms</h1>
  <p>Luxury handmade flowers 🌸💎</p>
  <button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
    Explorar
  </button>
</div>

<div class="section">
  <h2>Galería</h2>
  <div class="gallery">
    <div class="circle" style="background-image:url('https://pin.it/3nPkj1X6X');"></div>
    <div class="circle" style="background-image:url('https://pin.it/3nPkj1X6X');"></div>
    <div class="circle" style="background-image:url('https://pin.it/6FaEDCwbb');"></div>
  </div>
</div>

<div class="section">
  <h2>Colección</h2>
</div>

<div class="container" id="shop"></div>

<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Carrito</h3>
    <div id="cart"></div>
    <div id="total"></div>
    <a id="wa" target="_blank">Finalizar pedido</a>
    <button onclick="closeCart()">Cerrar</button>
  </div>
</div>

<script>
const products=[
{name:"Rosa pastel royal",price:350},
{name:"Girasol gold soft",price:450},
{name:"Tulip luxury",price:500},
{name:"Lilith box",price:900}
];

let cart=[];

function render(){
let shop=document.getElementById("shop");
shop.innerHTML="";
products.forEach((p,i)=>{
shop.innerHTML+=`
<div class="card">
<img src="https://source.unsplash.com/300x200/?flowers">
<h3>${p.name}</h3>
<p>RD$ ${p.price}</p>
<button onclick="add(${i})">Agregar</button>
</div>`;
});
update();
}

function add(i){
cart.push(products[i]);
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let html="",total=0,msg="Hola pedido:%0A";

cart.forEach(c=>{
total+=c.price;
html+=`<div>${c.name} - RD$${c.price}</div>`;
msg+=`- ${c.name} RD$${c.price}%0A`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total RD$"+total;

msg+=`%0ATotal: RD$${total}`;

document.getElementById("wa").href=
"https://wa.me/18296926964?text="+msg;
}

function openCart(){document.getElementById("modal").style.display="flex";}
function closeCart(){document.getElementById("modal").style.display="none";}

render();
</script>

</body>
</html>
