<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilith Bloms | Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#f7c6d9;
  --pink2:#fde7ef;
  --gold:#e6c78a;
  --cream:#fffaf5;
  --text:#4a4a4a;
}

/* BASE */
body{
  margin:0;
  font-family:'Montserrat';
  background:var(--cream);
  color:var(--text);
  overflow-x:hidden;
}

/* FLOATING FLOWERS ANIMATION */
.floater{
  position:fixed;
  top:-50px;
  width:20px;
  height:20px;
  background:radial-gradient(circle,var(--pink),var(--gold));
  border-radius:50%;
  opacity:0.5;
  animation:fall 10s linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,var(--pink2),#fff);
  padding:20px;
}

.hero h1{
  font-family:'Playfair Display';
  font-size:46px;
  margin:0;
  color:#6b4e57;
}

.hero p{
  max-width:340px;
  color:#7a6a70;
  font-size:14px;
}

.hero button{
  margin-top:15px;
  padding:14px 24px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section-title{
  text-align:center;
  font-family:'Playfair Display';
  margin:20px;
  color:#6b4e57;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  margin:8px;
}

.card p{
  margin:6px 8px;
  color:#888;
}

.card button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--pink);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  background:linear-gradient(135deg,var(--gold),#f5e1b8);
  color:#3a2f2f;
  padding:14px 16px;
  border-radius:50px;
  font-weight:bold;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  cursor:pointer;
}

/* MODAL CART */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:90%;
  max-width:400px;
  background:white;
  border-radius:20px;
  padding:15px;
  max-height:70%;
  overflow:auto;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
}

.total{
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.checkout{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  color:white;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- FLOATERS -->
<script>
for(let i=0;i<12;i++){
  let d=document.createElement("div");
  d.className="floater";
  d.style.left=Math.random()*100+"vw";
  d.style.animationDuration=(6+Math.random()*6)+"s";
  document.body.appendChild(d);
}
</script>

<!-- HERO -->
<div class="hero">
  <h1>Lilith Bloms</h1>
  <p>Luxury handmade flowers crafted with pastel elegance, gold details and love 🌸💎</p>
  <button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
    Explorar colección
  </button>
</div>

<h2 class="section-title">Colección Luxury</h2>

<div class="container" id="shop"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<!-- CART MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Tu carrito</h3>
    <div id="cart"></div>
    <div class="total" id="total"></div>
    <a class="checkout" id="wa" target="_blank">Finalizar pedido</a>
    <button onclick="closeCart()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;">Cerrar</button>
  </div>
</div>

<script>

/* 🌸 20 PRODUCTOS LUXURY */
const products = [
  {name:"Rosa pastel royal", price:350},
  {name:"Girasol gold soft", price:450},
  {name:"Tulip bouquet luxury", price:500},
  {name:"Lilith signature box", price:900},
  {name:"Royal pink bouquet", price:850},
  {name:"Mini roses set", price:300},
  {name:"Heart flower deluxe", price:420},
  {name:"Orchid elegance", price:700},
  {name:"White pearl flower", price:280},
  {name:"Gold edge lily", price:650},
  {name:"Luxury pastel mix", price:600},
  {name:"Dream bouquet XL", price:950},
  {name:"Soft rose bundle", price:390},
  {name:"Golden sparkle flower", price:480},
  {name:"Romantic pink set", price:550},
  {name:"Elegant floral box", price:800},
  {name:"Sweet pastel bloom", price:320},
  {name:"Signature rose duo", price:500},
  {name:"Premium lilac flower", price:420},
  {name:"Luxury custom bouquet", price:980}
];

let cart=[];

function render(){
  const shop=document.getElementById("shop");
  shop.innerHTML="";

  products.forEach((p,i)=>{
    shop.innerHTML+=`
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?flowers,luxury" />
        <h3>${p.name}</h3>
        <p>RD$ ${p.price}</p>
        <button onclick="add(${i})">Agregar</button>
      </div>
    `;
  });

  update();
}

function add(i){
  cart.push(products[i]);
  update();
}

function update(){

  document.getElementById("count").innerText=cart.length;

  let html="";
  let total=0;

  cart.forEach(c=>{
    total+=c.price;
    html+=`<div class="item">
      <span>${c.name}</span>
      <span>RD$${c.price}</span>
    </div>`;
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText="Total: RD$ "+total;

  let msg="Hola quiero pedido Lilith Bloms:%0A";

  cart.forEach(c=>{
    msg+="- "+c.name+" RD$"+c.price+"%0A";
  });

  msg+="%0ATotal: RD$"+total;

  document.getElementById("wa").href=
    "https://wa.me/18091234567?text="+msg;
}

function openCart(){
  document.getElementById("modal").style.display="flex";
}

function closeCart(){
  document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>
