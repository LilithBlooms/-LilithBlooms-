<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilith Bloms</title>

<style>
:root{
  --pink:#ff4d8d;
  --gold:#d4af37;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  background:#fff7fb;
}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--pink),var(--gold));
  color:white;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  margin:6px;
}

.card p{
  margin:6px;
  color:#666;
}

.card button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--pink);
  color:white;
  font-weight:bold;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px;
  border-radius:50px;
  font-weight:bold;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-radius:20px 20px 0 0;
  max-height:70%;
  overflow:auto;
  display:none;
  padding:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
}

.total{
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.checkout{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  background:var(--gold);
  color:black;
  font-weight:bold;
  text-decoration:none;
  border-radius:10px;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,var(--pink),var(--gold));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
}

.login input{
  padding:10px;
  margin:5px;
  width:220px;
  border:none;
  border-radius:10px;
}

.login button{
  width:220px;
  padding:10px;
  border:none;
  background:white;
  font-weight:bold;
}

/* ADMIN */
.admin{
  padding:10px;
  background:white;
  margin:10px;
  border-radius:12px;
}
.admin input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
.admin button{
  width:100%;
  padding:10px;
  background:var(--gold);
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>🌸 Lilith Bloms</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<header>
🌸✨ LILITH BLOMS — Flores de Limpiapipas 💖
</header>

<!-- ADMIN -->
<div class="admin">
  <h3>🧑‍💼 Admin Panel</h3>
  <input id="name" placeholder="Nombre flor">
  <input id="price" placeholder="Precio RD$">
  <button onclick="addProduct()">Agregar producto</button>
</div>

<!-- PRODUCTOS -->
<div class="container" id="grid"></div>

<!-- CART -->
<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<div class="panel" id="panel">
<h3>Tu carrito</h3>
<div id="cart"></div>
<div class="total" id="total"></div>
<a class="checkout" id="checkout" target="_blank">Pagar / WhatsApp</a>
</div>

<script type="module">

/* 🔥 FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_FIREBASE",
  authDomain: "TU_FIREBASE",
  projectId: "TU_FIREBASE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let cart = [];
let products = [];

/* LOGIN */
window.login = async ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("login").style.display="none";
    loadProducts();
  }
});

/* ADMIN ADD */
window.addProduct = async ()=>{
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  await addDoc(collection(db,"products"),{
    name,
    price
  });

  loadProducts();
};

/* LOAD */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  const grid = document.getElementById("grid");
  grid.innerHTML="";
  products = [];

  snap.forEach(d=>{
    const p = d.data();
    products.push(p);

    grid.innerHTML += `
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?flowers,pink,gold" />
        <h3>${p.name}</h3>
        <p>RD$ ${p.price}</p>
        <button onclick='add("${p.name}",${p.price})'>Agregar</button>
      </div>
    `;
  });
}

/* CART */
window.add = (name, price)=>{
  cart.push({name,price});
  renderCart();
};

function renderCart(){
  let total = 0;
  let html = "";

  cart.forEach(c=>{
    total += Number(c.price);
    html += `<div class="item">
      <span>${c.name}</span>
      <span>RD$${c.price}</span>
    </div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: RD$"+total;
  document.getElementById("count").innerText = cart.length;

  let msg = "Hola quiero pedido Lilith Bloms:%0A";
  cart.forEach(c=>{
    msg += "- "+c.name+" RD$"+c.price+"%0A";
  });
  msg += "Total RD$"+total;

  document.getElementById("checkout").href =
    "https://wa.me/18091234567?text="+msg;
}

window.toggleCart = ()=>{
  const p = document.getElementById("panel");
  p.style.display = p.style.display==="block"?"none":"block";
};

</script>

</body>
</html>
