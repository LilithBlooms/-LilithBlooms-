<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilith Bloms</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff7fb;
}

header{
  background:linear-gradient(135deg,#ff4d8d,#d4af37);
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  margin:6px;
}

.card p{
  margin:6px;
  color:#666;
}

.card button{
  width:100%;
  padding:10px;
  border:none;
  background:#ff4d8d;
  color:white;
  font-weight:bold;
}

.cart-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#d4af37;
  padding:14px;
  border-radius:50px;
  font-weight:bold;
}

.panel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-radius:20px 20px 0 0;
  max-height:70%;
  overflow:auto;
  display:none;
  padding:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
}

.total{
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.checkout{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  background:#d4af37;
  color:black;
  font-weight:bold;
  text-decoration:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
🌸 Lilith Bloms — Flores de Limpiapipas 💖✨
</header>

<div class="container" id="grid"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<div class="panel" id="panel">
<h3>Tu carrito</h3>
<div id="cart"></div>
<div class="total" id="total"></div>
<a class="checkout" id="wa" target="_blank">Enviar pedido</a>
</div>

<script>

const products = [
  {name:"Rosas rosadas", price:350},
  {name:"Girasol dorado", price:450},
  {name:"Bouquet premium", price:600},
  {name:"Caja deluxe", price:800}
];

let cart = [];

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  products.forEach((p,i)=>{
    grid.innerHTML += `
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?flowers" />
        <h3>${p.name}</h3>
        <p>RD$ ${p.price}</p>
        <button onclick="add(${i})">Agregar</button>
      </div>
    `;
  });

  update();
}

function add(i){
  cart.push(products[i]);
  update();
}

function update(){

  document.getElementById("count").innerText = cart.length;

  let html = "";
  let total = 0;

  cart.forEach(c=>{
    total += c.price;
    html += `
      <div class="item">
        <span>${c.name}</span>
        <span>RD$${c.price}</span>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: RD$ " + total;

  let msg = "Hola quiero pedido Lilith Bloms:%0A";

  cart.forEach(c=>{
    msg += "- "+c.name+" RD$"+c.price+"%0A";
  });

  msg += "%0ATotal: RD$"+total;

  document.getElementById("wa").href =
    "https://wa.me/18091234567?text="+msg;
}

function toggleCart(){
  const panel = document.getElementById("panel");
  panel.style.display = panel.style.display==="block"?"none":"block";
}

render();

</script>

</body>
</html>
