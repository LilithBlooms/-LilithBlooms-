<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilith Bloms | Business</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fffaf5;
}

header{
  padding:15px;
  text-align:center;
  background:linear-gradient(135deg,#f7c6d9,#e6c78a);
  color:white;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  margin:6px;
}

.card p{
  margin:6px;
  color:#777;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:#f7c6d9;
  color:white;
  font-weight:bold;
}

.cart{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#e6c78a;
  padding:12px;
  border-radius:50px;
  font-weight:bold;
}

.panel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  display:none;
  padding:12px;
  border-radius:20px 20px 0 0;
  max-height:60%;
  overflow:auto;
}
</style>
</head>

<body>

<header>🌸 Lilith Bloms Business</header>

<div class="grid" id="grid"></div>

<div class="cart" onclick="toggle()">🛒 <span id="count">0</span></div>

<div class="panel" id="panel">
  <h3>Pedidos</h3>
  <div id="cart"></div>
  <p id="total"></p>
  <button onclick="sendOrder()">Enviar pedido</button>
</div>

<script>

// 🔐 SUPABASE CONFIG
const supabaseUrl = "TU_URL";
const supabaseKey = "TU_KEY";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let cart = [];
let products = [];

// 📦 CARGAR PRODUCTOS REALES
async function loadProducts(){
  let { data } = await client.from("products").select("*");
  products = data;

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  products.forEach((p,i)=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${p.image || 'https://source.unsplash.com/300x200/?flowers'}">
        <h3>${p.name}</h3>
        <p>RD$ ${p.price}</p>
        <button onclick="add(${i})">Agregar</button>
      </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;
  updateCart();
}

function updateCart(){
  let html = "";
  let total = 0;

  cart.forEach(c=>{
    total += c.price;
    html += `<p>${c.name} - RD$${c.price}</p>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: RD$ "+total;
}

async function sendOrder(){
  let total = cart.reduce((a,b)=>a+b.price,0);

  await client.from("orders").insert([
    {
      items: JSON.stringify(cart),
      total: total
    }
  ]);

  alert("Pedido enviado 💖");
  cart = [];
  updateCart();
}

function toggle(){
  let p = document.getElementById("panel");
  p.style.display = p.style.display==="block"?"none":"block";
}

loadProducts();

</script>

</body>
</html>
