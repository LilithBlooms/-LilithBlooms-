<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flores de Limpiapipas 💐</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
    }

    header {
      text-align: center;
      padding: 20px;
    }

    header h1 {
      color: #d63384;
      margin-bottom: 5px;
    }

    .cart {
      position: sticky;
      top: 0;
      background: white;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #d63384;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #ad1f6a;
    }

    .cart-box {
      background: white;
      margin: 20px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    ul {
      padding-left: 20px;
    }

    .btn-clear {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  <h1>Flores de Limpiapipas 💐</h1>
  <p>Catálogo artesanal hecho con amor</p>
</header>

<!-- CART TOP -->
<div class="cart">
  <strong>🛒 Carrito: <span id="count">0</span> productos</strong>
  <button onclick="vaciar()">Vaciar carrito</button>
</div>

<section class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524594154900-1c0d6b4f1a7f">
    <h3>Rosa artesanal</h3>
    <button onclick="agregar('Rosa artesanal')">Agregar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
    <h3>Girasol brillante</h3>
    <button onclick="agregar('Girasol brillante')">Agregar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
    <h3>Lirio elegante</h3>
    <button onclick="agregar('Lirio elegante')">Agregar</button>
  </div>

</section>

<!-- CART LIST -->
<div class="cart-box">
  <h2>🧾 Productos en el carrito</h2>
  <ul id="lista"></ul>
</div>

<script>
  let carrito = [];

  function agregar(producto) {
    carrito.push(producto);
    actualizar();
  }

  function actualizar() {
    document.getElementById("count").innerText = carrito.length;

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrito.forEach((item) => {
      let li = document.createElement("li");
      li.textContent = item;
      lista.appendChild(li);
    });
  }

  function vaciar() {
    carrito = [];
    actualizar();
  }
</script>

</body>
</html>
