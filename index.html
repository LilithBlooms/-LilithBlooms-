<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LilithBlooms 💐</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffe6f0;
  overflow-x: hidden;
}

/* 🌸 fondo florecitas */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(#ff8fb1 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.15;
  z-index: -1;
}

/* 🌷 NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #d63384;
}

/* 🌸 HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 3em;
  margin: 0;
  color: #d63384;
}

.hero p {
  color: #555;
}

/* 🌼 CATEGORÍAS */
.categories {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 10px;
}

.cat-btn {
  padding: 10px 15px;
  border: 2px solid #d63384;
  border-radius: 30px;
  background: transparent;
  color: #d63384;
  cursor: pointer;
  transition: 0.3s;
}

.cat-btn:hover {
  background: #d63384;
  color: white;
}

/* 🛍️ PRODUCTOS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
  text-align: center;
}

.price {
  color: #d63384;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #d63384;
  color: white;
  cursor: pointer;
}

/* 🛒 CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 280px;
  height: 100%;
  background: white;
  box-shadow: -5px 0 20px rgba(0,0,0,0.2);
  padding: 15px;
}

.cart h2 {
  color: #d63384;
}

ul {
  list-style: none;
  padding: 0;
}

.checkout {
  width: 100%;
  background: black;
  margin-top: 10px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">🌸 LilithBlooms</div>
  <div>🛒 <span id="count">0</span></div>
</nav>

<div class="hero">
  <h1>Flores de Limpiapipas 💐</h1>
  <p>Hechas a mano con amor y estilo minimalista</p>
</div>

<!-- 🌼 categorías -->
<div class="categories">
  <button class="cat-btn">🌸 Rosas</button>
  <button class="cat-btn">🌼 Girasoles</button>
  <button class="cat-btn">🤍 Lilies</button>
  <button class="cat-btn">💐 Ramos</button>
</div>

<!-- 🛍️ productos -->
<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524594154900-1c0d6b4f1a7f">
    <div class="card-content">
      <h3>Rosa de limpiapipas</h3>
      <p class="price">$10</p>
      <button onclick="add('Rosa',10)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
    <div class="card-content">
      <h3>Girasol artesanal</h3>
      <p class="price">$15</p>
      <button onclick="add('Girasol',15)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
    <div class="card-content">
      <h3>Lirio minimalista</h3>
      <p class="price">$12</p>
      <button onclick="add('Lirio',12)">Agregar</button>
    </div>
  </div>

</div>

<!-- 🛒 carrito -->
<div class="cart">
  <h2>Carrito 💖</h2>
  <ul id="list"></ul>
  <h3>Total: $<span id="total">0</span></h3>
  <button class="checkout" onclick="pay()">Pagar 💳</button>
</div>

<script>
let cart = [];
let total = 0;

function add(name, price) {
  cart.push({name, price});
  total += price;
  render();
}

function render() {
  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach(i => {
    let li = document.createElement("li");
    li.textContent = i.name + " - $" + i.price;
    list.appendChild(li);
  });
}

function pay() {
  if(cart.length === 0){
    alert("Carrito vacío 💔");
    return;
  }

  alert("Pago exitoso 💳✨ Total: $" + total);
  cart = [];
  total = 0;
  render();
}
</script>

</body>
</html>
